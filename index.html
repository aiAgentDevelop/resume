<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이력서 - 이동완</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 글리치 전환 오버레이 (인쇄 시 숨김) -->
<canvas id="vhs-noise" aria-hidden="true"></canvas>
<div id="scanlines" aria-hidden="true"></div>
<div id="glitch-flash" aria-hidden="true"></div>

<div class="resume-container">
  <!-- Header -->
  <div class="resume-header" id="resume-header"></div>

  <!-- Profile -->
  <div class="profile-section" id="profile-section"></div>

  <!-- Summary -->
  <div class="summary-section" id="summary-section"></div>

  <!-- Skills -->
  <div class="skills-section" id="skills-section"></div>

  <!-- Personal Projects / Open Source -->
  <h2 class="section-title" id="projects-title"></h2>
  <div class="projects-section" id="projects-content"></div>

  <!-- Education -->
  <h2 class="section-title">학력</h2>
  <div class="education-section" id="education-content"></div>

  <!-- Career -->
  <h2 class="section-title" id="career-title">경력</h2>
  <div class="career-section" id="career-content"></div>

  <!-- Shipped Games -->
  <h2 class="section-title">참여 게임 작품</h2>
  <div class="shipped-games">
    <figure class="shipped-game">
      <img src="images/기타소녀.jpg" alt="기타소녀 키 비주얼" loading="lazy">
      <figcaption>
        <span class="sg-title">기타소녀</span>
        <span class="sg-meta">네오위즈 · 2017–2020 · Backend 전체 개발</span>
      </figcaption>
    </figure>
    <figure class="shipped-game">
      <img src="images/탭소닉월드챔피언.jpg" alt="탭소닉 월드챔피언 키 비주얼" loading="lazy">
      <figcaption>
        <span class="sg-title">탭소닉 월드챔피언</span>
        <span class="sg-meta">네오위즈 · 2016–2017 (런칭) · Backend 전체 개발</span>
      </figcaption>
    </figure>
    <figure class="shipped-game">
      <img src="images/탬소닉탑.jpg" alt="TAPSONIC TOP 키 비주얼" loading="lazy">
      <figcaption>
        <span class="sg-title">TAPSONIC TOP</span>
        <span class="sg-meta">네오위즈 · 2017–2020 · 유지보수·신규 콘텐츠</span>
      </figcaption>
    </figure>
    <figure class="shipped-game">
      <img src="images/테크니카Q.jpg" alt="테크니카Q 키 비주얼" loading="lazy">
      <figcaption>
        <span class="sg-title">테크니카Q</span>
        <span class="sg-meta">네오위즈 · 2017–2020 · 유지보수·신규 콘텐츠</span>
      </figcaption>
    </figure>
    <figure class="shipped-game">
      <img src="images/확산성밀리언아서.png" alt="확산성 밀리언아서 키 비주얼" loading="lazy">
      <figcaption>
        <span class="sg-title">확산성 밀리언아서</span>
        <span class="sg-meta">액토즈 · 게임빌 · 2013–2015 · 글로벌 6개국 서버 구축</span>
      </figcaption>
    </figure>
  </div>

  <!-- About -->
  <h2 class="section-title">자기소개서</h2>
  <div class="about-section" id="about-content"></div>

  <!-- Military -->
  <h2 class="section-title">취업우대사항</h2>
  <div class="table-section" id="military-content"></div>

  <!-- Footer -->
  <div class="resume-footer" id="resume-footer"></div>
</div>

<!-- API Mock Data (JS wrappers for file:// compatibility) -->
<script src="api/profile.js"></script>
<script src="api/summary.js"></script>
<script src="api/skills.js"></script>
<script src="api/education.js"></script>
<script src="api/career.js"></script>
<script src="api/projects.js"></script>
<script src="api/about.js"></script>
<script src="api/military.js"></script>

<!-- App -->
<script src="js/app.js"></script>
<script src="js/glitch-transition.js"></script>

</body>
</html>
